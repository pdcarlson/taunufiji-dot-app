name: Pull Request Checks

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

# `actions: write` is required for upload-artifact / download-artifact; with only
# `contents: read`, the default GITHUB_TOKEN cannot access workflow artifacts.
permissions:
  contents: read
  actions: write

jobs:
  deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Upload node_modules
        uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node_modules
          retention-days: 1

  lint:
    needs: deps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules

      - name: Lint
        run: npm run lint

  typecheck:
    needs: deps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules

      - name: Type check
        run: npx tsc --noEmit

  test:
    needs: deps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules

      - name: Test
        run: npm run test -- --run

  coverage-critical:
    needs: deps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules

      - name: Coverage (Critical Modules)
        run: npm run test:coverage:critical

  e2e-smoke:
    needs: deps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: E2E Smoke Tests
        run: npm run test:e2e

  validate-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Validate GitHub Secrets
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is missing in GitHub Secrets!"
            exit 1
          fi

  build:
    needs: deps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules

      - name: Build
        env:
          NEXT_PUBLIC_APP_URL: "https://example.com"
          NEXT_PUBLIC_APPWRITE_ENDPOINT: ${{ vars.NEXT_PUBLIC_APPWRITE_ENDPOINT || secrets.NEXT_PUBLIC_APPWRITE_ENDPOINT || 'https://example.com/v1' }}
          NEXT_PUBLIC_APPWRITE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_ID || secrets.NEXT_PUBLIC_APPWRITE_PROJECT_ID || 'mock-project-id' }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY || 'mock-appwrite-key' }}
          AWS_REGION: "us-east-1"
          AWS_ACCESS_KEY_ID: "mock-access-key"
          AWS_SECRET_ACCESS_KEY: "mock-secret-key"
          AWS_BUCKET_NAME: "mock-bucket"
          DISCORD_APP_ID: "mock-discord-app-id"
          DISCORD_PUBLIC_KEY: "mock-discord-public-key"
          DISCORD_BOT_TOKEN: "mock-discord-bot-token"
          DISCORD_GUILD_ID: "mock-discord-guild-id"
          DISCORD_HOUSING_CHANNEL_ID: "mock-discord-channel-id"
          DISCORD_ROLE_ID_BROTHER: "mock-role-brother"
          DISCORD_ROLE_ID_CABINET: "mock-role-cabinet"
          DISCORD_ROLE_ID_HOUSING_CHAIR: "mock-role-housing-chair"
          CRON_SECRET: "mock-cron-secret"
        run: SKIP_ENV_VALIDATION=true npm run build

  quality-gate:
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
      - coverage-critical
      - e2e-smoke
      - validate-secrets
      - build
    steps:
      - name: Quality gate passed
        run: echo "All CI checks passed."
