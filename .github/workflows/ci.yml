name: Pull Request Checks

on:
  push:
    branches: [main, staging, production]
  pull_request:
    branches: [main, staging, production]

# Artifact upload/download of `node_modules` breaks npm's `.bin` symlinks (zip
# round-trip), which surfaces as `next: not found`, `vitest: not found`, etc.
# Use `actions/setup-node` npm cache + `npm ci` per job instead.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test -- --run

  coverage-critical:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Coverage (Critical Modules)
        run: npm run test:coverage:critical

  e2e-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: E2E Smoke Tests
        run: npm run test:e2e

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_APP_URL: "https://example.com"
          NEXT_PUBLIC_APPWRITE_ENDPOINT: ${{ vars.NEXT_PUBLIC_APPWRITE_ENDPOINT || secrets.NEXT_PUBLIC_APPWRITE_ENDPOINT || 'https://example.com/v1' }}
          NEXT_PUBLIC_APPWRITE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_ID || secrets.NEXT_PUBLIC_APPWRITE_PROJECT_ID || 'mock-project-id' }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY || 'mock-appwrite-key' }}
          AWS_REGION: "us-east-1"
          AWS_ACCESS_KEY_ID: "mock-access-key"
          AWS_SECRET_ACCESS_KEY: "mock-secret-key"
          AWS_BUCKET_NAME: "mock-bucket"
          DISCORD_APP_ID: "mock-discord-app-id"
          DISCORD_PUBLIC_KEY: "mock-discord-public-key"
          DISCORD_BOT_TOKEN: "mock-discord-bot-token"
          DISCORD_GUILD_ID: "mock-discord-guild-id"
          DISCORD_HOUSING_CHANNEL_ID: "mock-discord-channel-id"
          DISCORD_ROLE_ID_BROTHER: "mock-role-brother"
          DISCORD_ROLE_ID_CABINET: "mock-role-cabinet"
          DISCORD_ROLE_ID_HOUSING_CHAIR: "mock-role-housing-chair"
          CRON_SECRET: "mock-cron-secret"
        run: SKIP_ENV_VALIDATION=true npm run build

  quality-gate:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
      - coverage-critical
      - e2e-smoke
      - build
    steps:
      - name: Enforce upstream job success
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          COVERAGE_RESULT: ${{ needs.coverage-critical.result }}
          E2E_RESULT: ${{ needs.e2e-smoke.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          set -euo pipefail
          failed=0
          for pair in \
            "lint:${LINT_RESULT}" \
            "typecheck:${TYPECHECK_RESULT}" \
            "test:${TEST_RESULT}" \
            "coverage-critical:${COVERAGE_RESULT}" \
            "e2e-smoke:${E2E_RESULT}" \
            "build:${BUILD_RESULT}"; do
            name="${pair%%:*}"
            result="${pair#*:}"
            if [ "$result" != "success" ]; then
              echo "::error::Job $name finished with result=$result (expected success)"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
          echo "All required jobs succeeded."

      - name: Quality gate passed
        run: echo "All CI checks passed."
